<svg width="1280" height="60" viewBox="0 0 1280 60" xmlns="http://www.w3.org/2000/svg" role="presentation">
  <!-- Brutalist striped divider — yellow / black / magenta blocks -->
  <rect x="0" y="22" width="1280" height="6" fill="#0A0A0A"/>
  <g transform="translate(0,0)">
    <rect x="40" y="14" width="80" height="32" fill="#FFD60A" stroke="#0A0A0A" stroke-width="3"/>
    <rect x="130" y="14" width="40" height="32" fill="#0A0A0A"/>
    <rect x="180" y="14" width="120" height="32" fill="#FFFBEA" stroke="#0A0A0A" stroke-width="3"/>
    <rect x="310" y="14" width="60" height="32" fill="#FF006E" stroke="#0A0A0A" stroke-width="3"/>
    <rect x="380" y="14" width="40" height="32" fill="#0A0A0A"/>
  </g>
  <!-- Right-side blocks -->
  <g transform="translate(870,0)">
    <rect x="0" y="14" width="40" height="32" fill="#0A0A0A"/>
    <rect x="50" y="14" width="60" height="32" fill="#FF7A56" stroke="#0A0A0A" stroke-width="3"/>
    <rect x="120" y="14" width="120" height="32" fill="#FFFBEA" stroke="#0A0A0A" stroke-width="3"/>
    <rect x="250" y="14" width="40" height="32" fill="#0A0A0A"/>
    <rect x="300" y="14" width="80" height="32" fill="#FFD60A" stroke="#0A0A0A" stroke-width="3"/>
  </g>
</svg>
