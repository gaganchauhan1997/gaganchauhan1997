<svg width="1280" height="520" viewBox="0 0 1280 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GAGAN CHAUHAN — Founder of HACKKNOW.COM — building intelligent systems beyond imagination">
  <defs>
