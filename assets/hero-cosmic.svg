    <pattern id="dotgrid" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#FFD60A" opacity="0.18"/>
    </pattern>

    <!-- NEBULA GRADIENTS -->
    <radialGradient id="nebulaMagenta" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF006E" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#FF006E" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF006E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebulaCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#00F0FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebulaViolet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#B026FF" stop-opacity="0.50"/>
      <stop offset="60%" stop-color="#B026FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#B026FF" stop-opacity="0"/>
    </radialGradient>

    <!-- DEEP SPACE BACKGROUND -->
    <linearGradient id="space" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="50%" stop-color="#0a0420"/>
      <stop offset="100%" stop-color="#050510"/>
    </linearGradient>

    <!-- TEXT GLOW FILTER -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- SCAN LINES PATTERN -->
    <pattern id="scanlines" x="0" y="0" width="100" height="3" patternUnits="userSpaceOnUse">
      <rect width="100" height="1" fill="#FFFBEA" opacity="0.025"/>
    </pattern>
