<svg width="1280" height="64" viewBox="0 0 1280 64" xmlns="http://www.w3.org/2000/svg" role="presentation">
  <defs>
    <linearGradient id="dgrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FFD60A"/>
      <stop offset="50%"  stop-color="#FF006E"/>
      <stop offset="100%" stop-color="#00F0FF"/>
    </linearGradient>
  </defs>

  <!-- thin horizontal line -->
  <rect x="0" y="29" width="1280" height="2" fill="url(#dgrad)" opacity="0.8"/>

  <!-- left blocks -->
  <g transform="translate(40,16)">
    <rect x="0"   y="0" width="86"  height="32" fill="#FFD60A" stroke="#0A0A0A" stroke-width="3"/>
    <rect x="96"  y="0" width="38"  height="32" fill="#0A0A0A"/>
    <rect x="144" y="0" width="120" height="32" fill="#FFFBEA" stroke="#0A0A0A" stroke-width="3"/>
    <rect x="274" y="0" width="56"  height="32" fill="#FF006E" stroke="#0A0A0A" stroke-width="3"/>
    <rect x="340" y="0" width="40"  height="32" fill="#0A0A0A"/>
    <rect x="390" y="0" width="48"  height="32" fill="#00F0FF" stroke="#0A0A0A" stroke-width="3"/>
  </g>

  <!-- center cosmic stamp -->
  <g transform="translate(580,12)">
    <rect x="0" y="0" width="120" height="40" fill="#0A0A0A"/>
    <text x="60" y="26" font-family="'JetBrains Mono','Courier New',monospace" font-weight="800" font-size="13" fill="#FFD60A" text-anchor="middle" letter-spacing="3">▸ // HK //</text>
  </g>

  <!-- right blocks -->
  <g transform="translate(842,16)">
    <rect x="0"   y="0" width="48"  height="32" fill="#00F0FF" stroke="#0A0A0A" stroke-width="3"/>
    <rect x="58"  y="0" width="40"  height="32" fill="#0A0A0A"/>
    <rect x="108" y="0" width="56"  height="32" fill="#FF7A56" stroke="#0A0A0A" stroke-width="3"/>
    <rect x="174" y="0" width="120" height="32" fill="#FFFBEA" stroke="#0A0A0A" stroke-width="3"/>
    <rect x="304" y="0" width="40"  height="32" fill="#0A0A0A"/>
    <rect x="354" y="0" width="86"  height="32" fill="#FFD60A" stroke="#0A0A0A" stroke-width="3"/>
  </g>

  <!-- side cosmic dots -->
  <circle cx="12"  cy="32" r="3" fill="#FFD60A"/>
  <circle cx="1268" cy="32" r="3" fill="#FF006E"/>
</svg>
