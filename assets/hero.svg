<svg width="1280" height="400" viewBox="0 0 1280 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Gagan Chauhan — Founder of Hackknow.com">
  <defs>
    <pattern id="dotgrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#0A0A0A" opacity="0.25"/>
    </pattern>
  </defs>

  <!-- Paper background -->
  <rect width="1280" height="400" fill="#FFFBEA"/>
  <rect width="1280" height="400" fill="url(#dotgrid)"/>

  <!-- Hard-shadow offset box -->
  <rect x="62" y="50" width="1180" height="320" fill="#0A0A0A"/>

  <!-- Main yellow card -->
  <rect x="50" y="38" width="1180" height="320" fill="#FFD60A" stroke="#0A0A0A" stroke-width="6"/>

  <!-- Decorative magenta accent block -->
  <rect x="1085" y="55" width="130" height="60" fill="#FF006E" stroke="#0A0A0A" stroke-width="5"/>
  <text x="1150" y="93" font-family="'JetBrains Mono','Courier New',monospace" font-weight="800" font-size="18" fill="#FFFBEA" text-anchor="middle">★ FOUNDER</text>

  <!-- Big name -->
  <text x="90" y="170" font-family="'Space Grotesk','Inter','Helvetica',sans-serif" font-weight="900" font-size="92" fill="#0A0A0A" letter-spacing="-2">GAGAN CHAUHAN</text>

  <!-- Tagline -->
  <text x="92" y="220" font-family="'JetBrains Mono','Courier New',monospace" font-weight="700" font-size="22" fill="#0A0A0A">FOUNDER · HACKKNOW.COM · MADE IN INDIA 🇮🇳</text>

  <!-- Subtitle bullets -->
  <text x="92" y="270" font-family="'Inter','Helvetica',sans-serif" font-weight="500" font-size="20" fill="#0A0A0A">React 19  ▪  Cloudflare Workers  ▪  WordPress  ▪  AI orchestration  ▪  BCA student</text>

  <!-- Mini chip row -->
  <g transform="translate(90,300)">
    <!-- Chip 1: hackknow.com -->
    <rect x="0" y="0" width="220" height="42" fill="#0A0A0A"/>
    <text x="110" y="29" font-family="'JetBrains Mono','Courier New',monospace" font-weight="700" font-size="16" fill="#FFD60A" text-anchor="middle">▸ HACKKNOW.COM</text>

    <!-- Chip 2: yexcel -->
    <rect x="234" y="0" width="220" height="42" fill="#FFFBEA" stroke="#0A0A0A" stroke-width="3"/>
    <text x="344" y="29" font-family="'JetBrains Mono','Courier New',monospace" font-weight="700" font-size="16" fill="#0A0A0A" text-anchor="middle">▸ YEXCEL</text>

    <!-- Chip 3: yahavi ai -->
    <rect x="468" y="0" width="220" height="42" fill="#FF006E" stroke="#0A0A0A" stroke-width="3"/>
    <text x="578" y="29" font-family="'JetBrains Mono','Courier New',monospace" font-weight="700" font-size="16" fill="#FFFBEA" text-anchor="middle">▸ YAHAVI AI</text>

    <!-- Chip 4: hiring -->
    <rect x="702" y="0" width="220" height="42" fill="#22C55E" stroke="#0A0A0A" stroke-width="3"/>
    <text x="812" y="29" font-family="'JetBrains Mono','Courier New',monospace" font-weight="700" font-size="16" fill="#0A0A0A" text-anchor="middle">● AVAILABLE</text>
  </g>
</svg>
